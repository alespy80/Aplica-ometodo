--evo: #00c896;       /* verde mais sofisticado */

/* BODY */
body{

color:#f5f5f5;

border-bottom:1px solid #1a1a1a;

/* CARDS */
.card{
background:var(--card);
box-shadow:0 0 18px rgba(0,0,0,.8);
}

/* TITULOS */
.card h2{
color:var(--evo);
}

/* BOTÕES */
button{
background:linear-gradient(135deg,var(--evo),var(--evo-dark));
color:#000;
}

/* STEPS */
.step{
background:#0a0a0a;
border-left:3px solid var(--evo);
}

/* WHATSAPP FIXO */
.whatsapp-fixo{
background:linear-gradient(135deg,var(--evo),var(--evo-dark));
color:#000;
box-shadow:0 0 12px rgba(0,200,150,.4);
}

<header>
<h1>MÉTODO EVO 360</h1>
<p>Evolução Física Estratégica</p>
</header>

<div class="container">

<!-- INTRO -->
<div class="card">
<h2>O Método EVO</h2>
<p>
O EVO 360 é um sistema de treinamento baseado em ativação neuromuscular,
controle de execução e progressão estratégica.
</p>
<p>
Aqui você não treina por volume, você treina com precisão.
Cada fase tem um objetivo fisiológico específico.
</p>
<button onclick="next('diagnostico')">Começar Aplicação</button>
</div>

<!-- DIAGNOSTICO -->
<div id="diagnostico" class="card hidden">
<h2>1. Diagnóstico Estratégico</h2>
<p>
Antes de treinar, é necessário entender como seu corpo responde ao estímulo.
</p>

<div class="step">✔ Avalie postura e alinhamento</div>
<div class="step">✔ Teste sua execução básica (agachamento, remada, elevação)</div>
<div class="step">✔ Identifique onde você não sente o músculo trabalhar</div>

<p><strong>Objetivo:</strong> Identificar falhas antes de aplicar carga.</p>

<button onclick="next('ativacao')">Aplicar Ativação</button>
</div>

<!-- ATIVACAO -->
<div id="ativacao" class="card hidden">
<h2>2. Ativação Neuromuscular</h2>

<p>Antes da carga, você precisa ensinar o músculo a trabalhar corretamente.</p>

<div class="step">✔ 2 a 3 séries de 12–15 reps</div>
<div class="step">✔ Execução lenta (3 segundos descida)</div>
<div class="step">✔ Segurar contração no pico</div>

<p>Aqui você melhora a conexão mente-músculo e evita compensações.</p>
<p><strong>Regra:</strong> Se não ativa, não evolui.</p>

<button onclick="next('tensao')">Ir para Tensão</button>
</div>

<!-- TENSAO -->
<div id="tensao" class="card hidden">
<h2>3. Tensão Mecânica</h2>

<p>Agora começa o estímulo real de hipertrofia.</p>

<div class="step">✔ 3 a 4 séries de 8–12 reps</div>
<div class="step">✔ Carga moderada a alta</div>
<div class="step">✔ Controle total do movimento</div>

<p>Foque na execução. Sem impulso, sem roubo.</p>
<p><strong>Objetivo:</strong> Gerar tensão máxima no músculo.</p>

<button onclick="next('intensidade')">Aplicar Intensidade</button>
</div>

<!-- INTENSIDADE -->
<div id="intensidade" class="card hidden">
<h2>4. Intensidade Estratégica</h2>

<p>Após a tensão, você extrai o máximo do músculo.</p>

<div class="step">✔ Escolha 1 técnica:</div>
<div class="step">• Drop set • Rest-pause • Isometria • Bi-set</div>

<p>Aplicar apenas na última série.</p>
<p><strong>Objetivo:</strong> Recrutar o máximo de fibras possível.</p>

<button onclick="next('progressao')">Entender Progressão</button>
</div>

<!-- PROGRESSAO -->
<div id="progressao" class="card hidden">
<h2>5. Progressão EVO</h2>

<p>Sem progressão, não existe evolução.</p>

<div class="step">✔ Aumentar carga gradualmente</div>
<div class="step">✔ Melhorar execução</div>
<div class="step">✔ Aumentar tempo sob tensão</div>
<div class="step">✔ Evoluir intensidade</div>

<p>Você não treina mais — você treina melhor a cada semana.</p>

<button onclick="next('aplicacao')">Ver Aplicação Prática</button>
</div>

<!-- APLICACAO -->
<div id="aplicacao" class="card hidden">
<h2>Aplicação Prática (Exemplo)</h2>

<p>Treino de perna no padrão EVO:</p>

<div class="step">🔥 Ativação: Extensora 2x15 (pausa no topo)</div>
<div class="step">⚡ Tensão: Agachamento 4x10 (controle total)</div>
<div class="step">⚡ Tensão: Leg Press 3x10</div>
<div class="step">💣 Intensidade: Drop set na extensora</div>

<p>Tempo total: 45–60 minutos com alta eficiência.</p>

<button onclick="alert('Agora você está aplicando o EVO corretamente 🚀')">
Finalizar Método
</button>
